name: 'ThreatCode STRIDE Threat Model'
description: 'Generate STRIDE threat models from IaC and upload as SARIF to GitHub Code Scanning'

inputs:
  input-file:
    description: 'Path to terraform plan JSON file'
    required: true
  format:
    description: 'Output format (sarif, json, markdown)'
    required: false
    default: 'sarif'
  min-severity:
    description: 'Minimum severity to report (critical, high, medium, low, info)'
    required: false
    default: 'info'
  no-llm:
    description: 'Disable LLM analysis'
    required: false
    default: 'true'
  config-file:
    description: 'Path to .threatcode.yml config file'
    required: false
    default: ''
  extra-rules:
    description: 'Comma-separated paths to additional rule files'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  sarif-file:
    description: 'Path to generated SARIF file'
    value: ${{ steps.scan.outputs.sarif-file }}
  threat-count:
    description: 'Total number of threats found'
    value: ${{ steps.scan.outputs.threat-count }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install ThreatCode
      shell: bash
      run: pip install threatcode

    - name: Run ThreatCode scan
      id: scan
      shell: bash
      # Use environment variables to prevent shell injection from inputs
      env:
        TC_INPUT_FILE: ${{ inputs.input-file }}
        TC_FORMAT: ${{ inputs.format }}
        TC_MIN_SEVERITY: ${{ inputs.min-severity }}
        TC_NO_LLM: ${{ inputs.no-llm }}
        TC_CONFIG_FILE: ${{ inputs.config-file }}
        TC_EXTRA_RULES: ${{ inputs.extra-rules }}
      run: |
        ARGS="--format $TC_FORMAT --min-severity $TC_MIN_SEVERITY"

        if [ "$TC_NO_LLM" = "true" ]; then
          ARGS="$ARGS --no-llm"
        fi

        if [ -n "$TC_CONFIG_FILE" ]; then
          ARGS="$ARGS --config $TC_CONFIG_FILE"
        fi

        if [ -n "$TC_EXTRA_RULES" ]; then
          IFS=',' read -ra RULES <<< "$TC_EXTRA_RULES"
          for rule in "${RULES[@]}"; do
            ARGS="$ARGS --rules $rule"
          done
        fi

        SARIF_FILE="threatcode-results.sarif"

        if [ "$TC_FORMAT" = "sarif" ]; then
          ARGS="$ARGS -o $SARIF_FILE"
        fi

        threatcode scan "$TC_INPUT_FILE" $ARGS || true

        echo "sarif-file=$SARIF_FILE" >> "$GITHUB_OUTPUT"

        if [ -f "$SARIF_FILE" ]; then
          COUNT=$(python -c "import json, sys; d=json.load(open(sys.argv[1])); print(len(d.get('runs',[{}])[0].get('results',[])))" "$SARIF_FILE")
          echo "threat-count=$COUNT" >> "$GITHUB_OUTPUT"
        else
          echo "threat-count=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@ea9e4e37992a54ee68a9571ad585ae0e9ce4e12b # v3.28.13
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-file }}
        category: threatcode
