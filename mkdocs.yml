site_name: ThreatCode
site_description: STRIDE threat model generator from Infrastructure-as-Code
site_url: https://ajokunu.github.io/ThreatCode
repo_url: https://github.com/ajokunu/ThreatCode
repo_name: ajokunu/ThreatCode

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Rule Writing Guide: writing-rules.md
  - MITRE ATT&CK: mitre-attack.md
  - CI/CD Integration: cicd.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Security: security.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
