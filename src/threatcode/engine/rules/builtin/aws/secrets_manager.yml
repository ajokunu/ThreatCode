rules:
  - id: SM_NO_ROTATION
    title: Secrets Manager secret without rotation
    description: >
      The secret does not have automatic rotation configured.
      Stale secrets increase the window of compromise.
    stride_category: information_disclosure
    severity: high
    resource_type: aws_secretsmanager_secret
    condition:
      rotation_rules:
        not_exists: true
    mitigation: >
      Enable automatic rotation with an appropriate Lambda function.
    metadata:
      mitre:
        techniques: ["T1528"]
        tactics: ["TA0006"]

  - id: SM_NO_KMS_KEY
    title: Secrets Manager secret without custom KMS key
    description: >
      The secret uses the default AWS-managed encryption key instead
      of a customer-managed KMS key for encryption.
    stride_category: information_disclosure
    severity: medium
    resource_type: aws_secretsmanager_secret
    condition:
      kms_key_id:
        not_exists: true
    mitigation: >
      Specify a customer-managed KMS key for secret encryption.
    metadata:
      mitre:
        techniques: ["T1530"]
        tactics: ["TA0009"]

  - id: SM_LONG_ROTATION
    title: Secrets Manager rotation interval exceeds 90 days
    description: >
      The secret rotation interval is greater than 90 days.
      Long rotation periods increase exposure if a secret is compromised.
    stride_category: information_disclosure
    severity: medium
    resource_type: aws_secretsmanager_secret
    condition:
      rotation_rules.automatically_after_days:
        greater_than: 90
    mitigation: >
      Reduce rotation interval to 90 days or less.
    metadata:
      mitre:
        techniques: ["T1528"]
        tactics: ["TA0006"]

  - id: SM_NO_RESOURCE_POLICY
    title: Secrets Manager secret without resource policy
    description: >
      The secret does not have a resource-based policy attached.
      Without a policy, access is governed only by IAM identity policies.
    stride_category: elevation_of_privilege
    severity: low
    resource_type: aws_secretsmanager_secret
    condition:
      policy:
        not_exists: true
    mitigation: >
      Attach a resource-based policy to restrict secret access.
    metadata:
      mitre:
        techniques: ["T1078"]
        tactics: ["TA0004"]
